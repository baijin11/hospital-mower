<title>发不出绩效的医院</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060612;overflow:hidden;font-family:'Segoe UI','Microsoft YaHei',sans-serif;touch-action:none;user-select:none}
canvas{display:block}

.bar{width:180px;height:14px;background:rgba(0,0,0,0.6);border-radius:7px;margin:3px 0;overflow:hidden;border:1px solid rgba(255,255,255,0.1);box-shadow:inset 0 2px 4px rgba(0,0,0,0.5)}
.bar-hp .fill{height:100%;background:linear-gradient(90deg,#ff6b6b,#e74c3c,#c0392b);border-radius:7px;transition:width .3s;box-shadow:0 0 8px rgba(231,76,60,0.7),inset 0 1px 0 rgba(255,255,255,0.3)}
.bar-xp .fill{height:100%;background:linear-gradient(90deg,#55efc4,#2ecc71,#27ae60);border-radius:7px;transition:width .3s;box-shadow:0 0 8px rgba(46,204,113,0.7),inset 0 1px 0 rgba(255,255,255,0.3)}
#hud-timer{position:absolute;top:12px;right:12px;color:#f1c40f;font-size:22px;font-weight:bold;text-shadow:0 0 16px rgba(241,196,15,0.9),0 2px 4px rgba(0,0,0,0.8);background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);border:1px solid rgba(241,196,15,0.25);border-radius:10px;padding:6px 14px;box-shadow:0 4px 16px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.08)}
#hud-level{position:absolute;top:12px;left:50%;transform:translateX(-50%);color:#f39c12;font-size:18px;font-weight:bold;text-shadow:0 0 16px rgba(243,156,18,0.9);background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);border:1px solid rgba(243,156,18,0.25);border-radius:10px;padding:5px 18px;box-shadow:0 4px 16px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.08)}
#hud-wave{position:absolute;top:44px;left:50%;transform:translateX(-50%);color:#ccc;font-size:12px;text-shadow:0 1px 3px rgba(0,0,0,0.8);background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);border-radius:8px;padding:3px 12px}

#boss-hp-bar .name{text-align:center;color:#ff8888;font-size:12px;font-weight:bold;margin-top:3px;text-shadow:0 0 8px rgba(255,100,100,0.8)}
#boss-speech{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ff6b6b;font-size:30px;font-weight:bold;text-shadow:0 0 30px rgba(255,0,0,0.9),0 0 60px rgba(255,0,0,0.4),2px 2px 0 #000;opacity:0;transition:opacity .3s;pointer-events:none;text-align:center;white-space:nowrap}

#menu{background:radial-gradient(ellipse at 50% 40%,#12122a 0%,#08081a 50%,#030308 100%)}
#menu h1{font-size:42px;color:#f1c40f;text-shadow:0 0 30px rgba(241,196,15,0.9),0 0 60px rgba(255,150,0,0.5),0 0 90px rgba(255,100,0,0.3);margin-bottom:8px;text-align:center;letter-spacing:2px}
#menu .sub{color:#888;font-size:14px;margin-bottom:28px;text-shadow:0 1px 3px rgba(0,0,0,0.8)}
.btn{padding:13px 48px;font-size:18px;border:none;border-radius:12px;cursor:pointer;margin:6px;font-weight:bold;pointer-events:auto;transition:all .2s;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:rgba(255,255,255,0.12);border-radius:12px 12px 0 0;pointer-events:none}
.btn:hover{transform:scale(1.06) translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.btn:active{transform:scale(.96)}
.btn-start{background:linear-gradient(145deg,#e74c3c,#c0392b,#a0281d);color:#fff;box-shadow:0 4px 16px rgba(192,57,43,0.5),inset 0 1px 0 rgba(255,255,255,0.15)}
.btn-retry{background:linear-gradient(145deg,#3498db,#2980b9,#1a6fa0);color:#fff;box-shadow:0 4px 16px rgba(52,152,219,0.5),inset 0 1px 0 rgba(255,255,255,0.15)}

.card .icon{font-size:38px;margin-bottom:10px;filter:drop-shadow(0 0 8px rgba(255,255,255,0.3))}
.card .name{font-size:14px;font-weight:bold;margin-bottom:5px;text-shadow:0 1px 3px rgba(0,0,0,0.5)}
.card .desc{font-size:11px;color:#99aabb}
.card .lv{font-size:11px;color:#2ecc71;margin-top:8px;text-shadow:0 0 8px rgba(46,204,113,0.5)}

#gameover h2{color:#e74c3c;font-size:34px;margin-bottom:18px;text-shadow:0 0 20px rgba(192,57,43,0.9)}

.stat{color:#ccc;font-size:15px;margin:5px 0}
.stat span{color:#f1c40f;font-weight:bold;text-shadow:0 0 8px rgba(241,196,15,0.5)}
#controls-hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);color:#555;font-size:11px;background:rgba(0,0,0,0.4);border-radius:6px;padding:3px 10px}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div id="hud">
    <div class="hud-panel">
      <div style="font-size:11px;color:#ff8888;margin-bottom:2px">❤️ <span id="hp-text">100/100</span></div>
      <div class="bar bar-hp"><div class="fill" id="hp-bar"></div></div>
      <div style="font-size:11px;color:#55efc4;margin-bottom:2px;margin-top:4px">⭐ <span id="xp-text">0/10</span></div>
      <div class="bar bar-xp"><div class="fill" id="xp-bar"></div></div>
    </div>
  </div>
  <div id="hud-timer">⏱ 5:00</div>
  <div id="hud-level">Lv.1</div>
  <div id="hud-wave">门诊大厅 · Wave 1</div>
  <div id="hud-kills">💀 0</div>
  <div id="hud-weapons"></div>
  <div id="boss-hp-bar"><div class="fill-wrap"><div class="fill" id="boss-hp-fill"></div></div><div class="name" id="boss-name"></div></div>
  <div id="boss-speech"></div>
  <canvas id="minimap" width="120" height="120"></canvas>
  <div id="controls-hint">WASD/方向键 移动 | 自动攻击 | 手机触摸左半屏摇杆</div>
</div>
<div id="menu" class="overlay">
  <h1>🏥 发不出绩效的医院</h1>
  <div class="sub">——一个放射科医生的生存指南</div>
  <button class="btn btn-start" onclick="startGame(1)">开始第1关：门诊大厅</button>
  <button class="btn btn-start" style="background:linear-gradient(135deg,#e67e22,#d35400)" onclick="startGame(2)">第2关：急诊科</button>
  <button class="btn btn-start" style="background:linear-gradient(135deg,#8e44ad,#6c3483)" onclick="startGame(3)">第3关：住院部</button>
  <button class="btn btn-start" style="background:linear-gradient(135deg,#2c3e50,#1a252f)" onclick="startGame(4)">第4关：行政楼</button>
  <button class="btn btn-start" style="background:linear-gradient(135deg,#c0392b,#7b241c)" onclick="startGame(5)">第5关：终极科室</button>
</div>
<div id="levelup" class="overlay" style="display:none">
  <h2>🎉 升级啦！</h2>
  <div id="levelup-cards"></div>
</div>
<div id="gameover" class="overlay" style="display:none">
  <h2 id="go-title">游戏结束</h2>
  <div class="stat">存活时间: <span id="go-time">0:00</span></div>
  <div class="stat">击杀数量: <span id="go-kills">0</span></div>
  <div class="stat">最终等级: <span id="go-level">1</span></div>
  <div class="stat">获得武器: <span id="go-weapons">声波</span></div>
  <button class="btn btn-retry" onclick="backToMenu()">返回菜单</button>
</div>

let G={},keys={},touch={active:false,sx:0,sy:0,cx:0,cy:0,dx:0,dy:0};
window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase()))e.preventDefault()});
window.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
canvas.addEventListener('touchstart',onTouchStart,{passive:false});
canvas.addEventListener('touchmove',onTouchMove,{passive:false});
canvas.addEventListener('touchend',onTouchEnd,{passive:false});
canvas.addEventListener('touchcancel',onTouchEnd,{passive:false});

function onTouchStart(e){
  e.preventDefault();
  for(let t of e.changedTouches){
    if(t.clientX<canvas.width*0.5){
      touch.active=true;touch.sx=t.clientX;touch.sy=t.clientY;touch.cx=t.clientX;touch.cy=t.clientY;
      touch.id=t.identifier;
    }
  }
}
function onTouchMove(e){
  e.preventDefault();
  for(let t of e.changedTouches){
    if(t.identifier===touch.id){
      touch.cx=t.clientX;touch.cy=t.clientY;
      let dx=touch.cx-touch.sx,dy=touch.cy-touch.sy;
      let d=Math.hypot(dx,dy),maxR=50;
      if(d>maxR){dx=dx/d*maxR;dy=dy/d*maxR}
      touch.dx=dx/maxR;touch.dy=dy/maxR;
    }
  }
}
function onTouchEnd(e){
  for(let t of e.changedTouches){
    if(t.identifier===touch.id){touch.active=false;touch.dx=0;touch.dy=0}
  }
}


// ==================== 3D SKELETAL HUMANOID SYSTEM ====================
// 通用3D人形绘制 — 骨骼动画驱动，所有角色共用
// 骨骼：head, neck, torso, upperArmL/R, foreArmL/R, upperLegL/R, lowerLegL/R

function drawLimb(c, x1, y1, x2, y2, thickness, color) {
  let dx = x2 - x1, dy = y2 - y1;
  let len = Math.hypot(dx, dy);
  if (len < 1) return;
  let a = Math.atan2(dy, dx);
  c.save();
  c.translate(x1, y1);
  c.rotate(a);
  let r = thickness / 2;
  // 简化渐变：2段代替4段，性能提升30%+
  let grad = c.createLinearGradient(0, -r, 0, r);
  grad.addColorStop(0, lightenColor(color, 40));
  grad.addColorStop(0.5, color);
  grad.addColorStop(1, darkenColor(color, 40));
  c.fillStyle = grad;
  c.beginPath();
  c.moveTo(r, 0);
  c.lineTo(len - r, 0);
  c.arc(len - r, 0, r, 0, Math.PI);
  c.lineTo(r, r);
  c.arc(r, 0, r, Math.PI, 0);
  c.closePath();
  c.fill();
  c.restore();
}

function walkCycle(t, speed) {
  // 返回行走周期各关节角度（弧度）
  // t: 时间(秒), speed: 速度倍率
  let phase = t * speed * 6;
  return {
    upperArmL: Math.sin(phase) * 0.6,
    foreArmL: -0.3 + Math.sin(phase + 0.5) * 0.4,
    upperArmR: Math.sin(phase + Math.PI) * 0.6,
    foreArmR: -0.3 + Math.sin(phase + Math.PI + 0.5) * 0.4,
    upperLegL: Math.sin(phase + Math.PI) * 0.5,
    lowerLegL: Math.max(0, Math.sin(phase + Math.PI + 0.8)) * 0.7,
    upperLegR: Math.sin(phase) * 0.5,
    lowerLegR: Math.max(0, Math.sin(phase + 0.8)) * 0.7,
    bodyBob: Math.abs(Math.sin(phase * 2)) * 2,  // 身体上下弹跳
    bodyTilt: Math.sin(phase) * 0.03  // 身体微倾
  };
}

function idleCycle(t) {
  // 静止站立时的呼吸动画
  let phase = t * 1.5;
  return {
    upperArmL: 0.05 + Math.sin(phase) * 0.03,
    foreArmL: -0.2,
    upperArmR: -0.05 + Math.sin(phase + 1) * 0.03,
    foreArmR: -0.2,
    upperLegL: 0,
    lowerLegL: 0,
    upperLegR: 0,
    lowerLegR: 0,
    bodyBob: Math.sin(phase * 2) * 1,
    bodyTilt: 0
  };
}

function drawHumanoid(c, x, y, scale, bones, opts) {
  // 通用3D骨骼人形绘制
  // opts: { skinColor, shirtColor, pantsColor, shoeColor, headRadius, torsoH, torsoW,
  //         upperArmLen, foreArmLen, upperLegLen, lowerLegLen,
  //         upperArmW, foreArmW, upperLegW, lowerLegW,
  //         headExtra, bodyExtra, drawFace, faceType, moving, isMoving }
  opts = opts || {};
  let skin = opts.skinColor || '#f0c898';
  let shirt = opts.shirtColor || '#3498db';
  let pants = opts.pantsColor || '#2c3e50';
  let shoe = opts.shoeColor || '#1a1a2e';

  // 比例参数（相对于scale）
  let headR = (opts.headRadius || 0.38) * scale;
  let torsoH = (opts.torsoH || 0.65) * scale;
  let torsoW = (opts.torsoW || 0.5) * scale;
  let uaLen = (opts.upperArmLen || 0.38) * scale;
  let faLen = (opts.foreArmLen || 0.35) * scale;
  let ulLen = (opts.upperLegLen || 0.45) * scale;
  let llLen = (opts.lowerLegLen || 0.4) * scale;
  let uaW = (opts.upperArmW || 0.14) * scale;
  let faW = (opts.foreArmW || 0.11) * scale;
  let ulW = (opts.upperLegW || 0.18) * scale;
  let llW = (opts.lowerLegW || 0.14) * scale;
  let neckLen = scale * 0.1;

  c.save();
  c.translate(x, y + (bones.bodyBob || 0));
  c.rotate(bones.bodyTilt || 0);

  // 关键位置
  let neckX = 0, neckY = -torsoH / 2 + neckLen;
  let headX = neckX, headY = neckY - headR - 2;
  let shoulderY = neckY;
  let hipY = torsoH / 2;
  let shoulderW = torsoW * 0.85;

  // === 后面的手臂（先画，被身体遮挡） ===
  // 左上臂
  let luaAngle = -Math.PI/2 + bones.upperArmL;
  let luaEndX = -shoulderW + Math.cos(luaAngle) * uaLen;
  let luaEndY = shoulderY + Math.sin(luaAngle) * uaLen;
  drawLimb(c, -shoulderW, shoulderY, luaEndX, luaEndY, uaW, shirt);
  // 左前臂
  let lfaAngle = luaAngle + bones.foreArmL;
  let lfaEndX = luaEndX + Math.cos(lfaAngle) * faLen;
  let lfaEndY = luaEndY + Math.sin(lfaAngle) * faLen;
  drawLimb(c, luaEndX, luaEndY, lfaEndX, lfaEndY, faW, skin);
  // 左手（简化为圆）
  c.fillStyle = skin;
  c.beginPath(); c.arc(lfaEndX, lfaEndY, faW * 0.45, 0, Math.PI * 2); c.fill();

  // === 后面的腿 ===
  // 左大腿
  let lulAngle = Math.PI/2 + bones.upperLegL;
  let lulEndX = -torsoW * 0.3 + Math.cos(lulAngle) * ulLen;
  let lulEndY = hipY + Math.sin(lulAngle) * ulLen;
  drawLimb(c, -torsoW * 0.3, hipY, lulEndX, lulEndY, ulW, pants, lightenColor(pants, 30));
  // 左小腿
  let lllAngle = lulAngle + bones.lowerLegL;
  let lllEndX = lulEndX + Math.cos(lllAngle) * llLen;
  let lllEndY = lulEndY + Math.sin(lllAngle) * llLen;
  drawLimb(c, lulEndX, lulEndY, lllEndX, lllEndY, llW, pants, lightenColor(pants, 20));
  // 左脚（椭圆）
  c.fillStyle = shoe;
  c.beginPath(); c.ellipse(lllEndX + 3, lllEndY, llW * 0.7, llW * 0.4, 0.2, 0, Math.PI * 2); c.fill();
  c.fillStyle = 'rgba(255,255,255,0.15)';
  c.beginPath(); c.ellipse(lllEndX + 2, lllEndY - 1, llW * 0.4, llW * 0.2, 0.2, 0, Math.PI * 2); c.fill();

  // === 躯干（简化3D感） ===
  let bodyGrad = c.createLinearGradient(-torsoW, 0, torsoW, 0);
  bodyGrad.addColorStop(0, darkenColor(shirt, 35));
  bodyGrad.addColorStop(0.5, lightenColor(shirt, 25));
  bodyGrad.addColorStop(1, darkenColor(shirt, 35));
  c.fillStyle = bodyGrad;
  c.beginPath();
  let bodyTop = neckY - 2, bodyBot = hipY;
  let bw = torsoW, br = torsoW * 0.25;
  c.moveTo(-bw + br, bodyTop);
  c.lineTo(bw - br, bodyTop);
  c.quadraticCurveTo(bw, bodyTop, bw, bodyTop + br);
  c.lineTo(bw, bodyBot - br);
  c.quadraticCurveTo(bw, bodyBot, bw - br, bodyBot);
  c.lineTo(-bw + br, bodyBot);
  c.quadraticCurveTo(-bw, bodyBot, -bw, bodyBot - br);
  c.lineTo(-bw, bodyTop + br);
  c.quadraticCurveTo(-bw, bodyTop, -bw + br, bodyTop);
  c.closePath();
  c.fill();

  // === 前面的手臂 ===
  // 右上臂
  let ruaAngle = -Math.PI/2 + bones.upperArmR;
  let ruaEndX = shoulderW + Math.cos(ruaAngle) * uaLen;
  let ruaEndY = shoulderY + Math.sin(ruaAngle) * uaLen;
  drawLimb(c, shoulderW, shoulderY, ruaEndX, ruaEndY, uaW, shirt);
  // 右前臂
  let rfaAngle = ruaAngle + bones.foreArmR;
  let rfaEndX = ruaEndX + Math.cos(rfaAngle) * faLen;
  let rfaEndY = ruaEndY + Math.sin(rfaAngle) * faLen;
  drawLimb(c, ruaEndX, ruaEndY, rfaEndX, rfaEndY, faW, skin);
  // 右手（简化为圆）
  c.fillStyle = skin;
  c.beginPath(); c.arc(rfaEndX, rfaEndY, faW * 0.45, 0, Math.PI * 2); c.fill();

  // === 前面的腿 ===
  // 右大腿
  let rulAngle = Math.PI/2 + bones.upperLegR;
  let rulEndX = torsoW * 0.3 + Math.cos(rulAngle) * ulLen;
  let rulEndY = hipY + Math.sin(rulAngle) * ulLen;
  drawLimb(c, torsoW * 0.3, hipY, rulEndX, rulEndY, ulW, pants, lightenColor(pants, 30));
  // 右小腿
  let rllAngle = rulAngle + bones.lowerLegR;
  let rllEndX = rulEndX + Math.cos(rllAngle) * llLen;
  let rllEndY = rulEndY + Math.sin(rllAngle) * llLen;
  drawLimb(c, rulEndX, rulEndY, rllEndX, rllEndY, llW, pants, lightenColor(pants, 20));
  // 右脚
  c.fillStyle = shoe;
  c.beginPath(); c.ellipse(rllEndX + 3, rllEndY, llW * 0.7, llW * 0.4, 0.2, 0, Math.PI * 2); c.fill();
  c.fillStyle = 'rgba(255,255,255,0.15)';
  c.beginPath(); c.ellipse(rllEndX + 2, rllEndY - 1, llW * 0.4, llW * 0.2, 0.2, 0, Math.PI * 2); c.fill();

  // === 脖子 ===
  c.fillStyle = skin;
  c.fillRect(-scale * 0.06, neckY - 2, scale * 0.12, neckLen + 2);
  c.fillStyle = 'rgba(255,255,255,0.12)';
  c.fillRect(-scale * 0.02, neckY - 2, scale * 0.04, neckLen + 2);

  // === 头部（3D球面，简化） ===
  let headGrad = c.createRadialGradient(headX - headR * 0.3, headY - headR * 0.3, headR * 0.1, headX, headY, headR);
  headGrad.addColorStop(0, lightenColor(skin, 45));
  headGrad.addColorStop(0.6, skin);
  headGrad.addColorStop(1, darkenColor(skin, 45));
  c.fillStyle = headGrad;
  c.beginPath(); c.arc(headX, headY, headR, 0, Math.PI * 2); c.fill();
  // 简单高光
  c.fillStyle = 'rgba(255,255,255,0.18)';
  c.beginPath(); c.arc(headX - headR * 0.25, headY - headR * 0.25, headR * 0.35, 0, Math.PI * 2); c.fill();

  // === 脸部 ===
  if (opts.drawFace !== false) {
    let ft = opts.faceType || 'normal';
    let eOff = headR * 0.35;
    let eY = headY - headR * 0.1;

    if (ft === 'angry') {
      // 愤怒脸
      c.fillStyle = '#fff';
      c.beginPath(); c.arc(headX - eOff, eY, headR * 0.18, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(headX + eOff, eY, headR * 0.18, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#cc0000';
      c.beginPath(); c.arc(headX - eOff, eY + 1, headR * 0.1, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(headX + eOff, eY + 1, headR * 0.1, 0, Math.PI * 2); c.fill();
      // 眉毛
      c.strokeStyle = '#993300'; c.lineWidth = 2.5; c.lineCap = 'round';
      c.beginPath(); c.moveTo(headX - eOff - headR * 0.22, eY - headR * 0.28); c.lineTo(headX - eOff + headR * 0.12, eY - headR * 0.18); c.stroke();
      c.beginPath(); c.moveTo(headX + eOff + headR * 0.22, eY - headR * 0.28); c.lineTo(headX + eOff - headR * 0.12, eY - headR * 0.18); c.stroke();
      c.lineCap = 'butt';
      // 嘴
      c.fillStyle = '#660000';
      c.beginPath(); c.arc(headX, headY + headR * 0.4, headR * 0.22, 0, Math.PI); c.fill();
      // 牙齿
      c.fillStyle = '#eee';
      for (let i = -2; i <= 2; i++) {
        c.fillRect(headX + i * headR * 0.08 - 1.5, headY + headR * 0.4 - 1, 3, headR * 0.1);
      }
    } else if (ft === 'glasses') {
      // 戴眼镜
      c.fillStyle = '#333';
      c.beginPath(); c.arc(headX - eOff, eY, headR * 0.1, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(headX + eOff, eY, headR * 0.1, 0, Math.PI * 2); c.fill();
      // 眼镜框
      c.strokeStyle = '#1a1a2e'; c.lineWidth = 1.8;
      c.beginPath(); c.arc(headX - eOff, eY, headR * 0.17, 0, Math.PI * 2); c.stroke();
      c.beginPath(); c.arc(headX + eOff, eY, headR * 0.17, 0, Math.PI * 2); c.stroke();
      c.beginPath(); c.moveTo(headX - eOff + headR * 0.17, eY); c.lineTo(headX + eOff - headR * 0.17, eY); c.stroke();
      c.fillStyle = 'rgba(100,180,255,0.15)';
      c.beginPath(); c.arc(headX - eOff, eY, headR * 0.15, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(headX + eOff, eY, headR * 0.15, 0, Math.PI * 2); c.fill();
      // 微笑
      c.strokeStyle = '#a05030'; c.lineWidth = 1.5;
      c.beginPath(); c.arc(headX, headY + headR * 0.35, headR * 0.15, 0.2, Math.PI - 0.2); c.stroke();
    } else if (ft === 'bloodshot') {
      // 血丝眼
      c.fillStyle = '#fff';
      c.beginPath(); c.arc(headX - eOff, eY, headR * 0.16, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(headX + eOff, eY, headR * 0.16, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#cc2222';
      c.beginPath(); c.arc(headX - eOff, eY, headR * 0.08, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(headX + eOff, eY, headR * 0.08, 0, Math.PI * 2); c.fill();
      // 张嘴
      c.fillStyle = '#882200';
      c.beginPath(); c.arc(headX, headY + headR * 0.4, headR * 0.12, 0, Math.PI); c.fill();
    } else {
      // 普通脸
      c.fillStyle = '#333';
      c.beginPath(); c.arc(headX - eOff, eY, headR * 0.1, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(headX + eOff, eY, headR * 0.1, 0, Math.PI * 2); c.fill();
      // 眼白高光
      c.fillStyle = '#fff';
      c.beginPath(); c.arc(headX - eOff + 2, eY - 2, headR * 0.04, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(headX + eOff + 2, eY - 2, headR * 0.04, 0, Math.PI * 2); c.fill();
      // 微笑
      c.strokeStyle = '#bb8866'; c.lineWidth = 1.5;
      c.beginPath(); c.arc(headX, headY + headR * 0.35, headR * 0.15, 0.15, Math.PI - 0.15); c.stroke();
    }
  }

  // === 头部额外装饰 ===
  if (opts.headExtra) opts.headExtra(c, x, y, headX, headY, headR, scale);
  // === 身体额外装饰 ===
  if (opts.bodyExtra) opts.bodyExtra(c, x, y, torsoW, neckY, hipY, shoulderW, scale);

  c.restore();
}

// 简化版3D球体（性能优化）
function draw3DSphere(c, x, y, r, baseColor, opts){
  opts = opts || {};
  // 落地阴影
  if(!opts.noShadow){
    c.fillStyle = 'rgba(0,0,0,0.18)';
    c.beginPath();
    c.ellipse(x + r*0.1, y + r*0.75, r*0.85, r*0.22, 0, 0, Math.PI*2);
    c.fill();
  }
  // 主体径向渐变
  let hx = x - r*0.3, hy = y - r*0.3;
  let grad = c.createRadialGradient(hx, hy, r*0.05, x, y, r);
  if(opts.gradStops){
    for(let s of opts.gradStops) grad.addColorStop(s[0], s[1]);
  } else {
    grad.addColorStop(0, lightenColor(baseColor, 70));
    grad.addColorStop(0.5, baseColor);
    grad.addColorStop(1, darkenColor(baseColor, 60));
  }
  c.fillStyle = grad;
  c.beginPath(); c.arc(x, y, r, 0, Math.PI*2); c.fill();
  // 简单高光
  c.fillStyle = 'rgba(255,255,255,0.35)';
  c.beginPath(); c.arc(hx, hy, r*0.3, 0, Math.PI*2); c.fill();
}

// 颜色处理工具
function lightenColor(hex, amt){
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, r+amt); g = Math.min(255, g+amt); b = Math.min(255, b+amt);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}
function darkenColor(hex, amt){
  // 支持 rgba 字符串
  if(hex.startsWith('rgba')||hex.startsWith('rgb')) return hex;
  if(hex.length < 4) return hex;
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, r-amt); g = Math.max(0, g-amt); b = Math.max(0, b-amt);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ==================== DRAWING HELPERS ====================
function drawPatient(c,x,y,size,color,type,el){

  let bones = walkCycle(anim, type==='fast' ? 1.8 : 1.0);

          c.lineTo(hx+Math.cos(a)*hr*1.4+rand(-2,2),hy+Math.sin(a)*hr*1.4);

          c.closePath();c.fill();
        }
      },

        // 手中举着手机

        c.fillStyle='rgba(68,136,255,0.85)';
        c.beginPath();c.roundRect(sw+sc*0.17,ny+sc*0.08,sc*0.16,sc*0.22,1);c.fill();

  }else if(type==='admin'){
    opts = {
      skinColor:'#e8c090', shirtColor:'#2c3e50', pantsColor:'#1a1a2e', shoeColor:'#0a0a14',

function drawBoss(c,x,y,size,bossName,hp,maxHp,color,shielded,raging){
  c.save();c.translate(x,y);
  let anim=Date.now()/1000;
  // 地面阴影（大椭圆）
  c.fillStyle='rgba(0,0,0,0.3)';
  c.beginPath();c.ellipse(0,size*1.0,size*1.3,size*0.35,0,0,Math.PI*2);c.fill();
  // 外层脉冲光环（双环）
  let auraR1=size+18+Math.sin(anim*3.6)*7;
  let auraR2=size+32+Math.sin(anim*4.6)*5;
  let auraA=raging?0.5:0.25;
  let auraC=raging?'255,0,0':'255,68,68';
  c.strokeStyle='rgba('+auraC+','+auraA+')';c.lineWidth=3;
  c.beginPath();c.arc(0,size*0.1,auraR1,0,Math.PI*2);c.stroke();
  c.strokeStyle='rgba('+auraC+','+(auraA*0.5)+')';c.lineWidth=2;
  c.beginPath();c.arc(0,size*0.1,auraR2,0,Math.PI*2);c.stroke();

  // Boss骨骼人形 — 夸张比例的大块头
  let bones = walkCycle(anim, raging ? 1.5 : 0.8);
  // 暴怒时加大动作幅度
  if(raging){
    bones.upperArmL *= 1.5; bones.upperArmR *= 1.5;
    bones.foreArmL *= 1.3; bones.foreArmR *= 1.3;
    bones.upperLegL *= 1.3; bones.upperLegR *= 1.3;
    bones.lowerLegL *= 1.2; bones.lowerLegR *= 1.2;
    bones.bodyBob *= 1.5;
  }

  let bossSkin = raging ? '#e8a080' : '#e8c090';
  let bossShirt = raging ? '#cc2200' : color;

  drawHumanoid(c, 0, 0, size*1.2, bones, {
    skinColor: bossSkin,
    shirtColor: bossShirt,
    pantsColor: raging ? '#330000' : '#440000',
    shoeColor: '#1a0000',
    headRadius: 0.42,
    torsoH: 0.75,
    torsoW: 0.6,
    upperArmLen: 0.42,
    foreArmLen: 0.38,
    upperLegLen: 0.48,
    lowerLegLen: 0.44,
    upperArmW: 0.2,
    foreArmW: 0.16,
    upperLegW: 0.22,
    lowerLegW: 0.18,
    faceType: 'angry',
    headExtra: function(c,ox,oy,hx,hy,hr,sc){
      // 怒发冲冠（更夸张）
      c.fillStyle = raging ? 'rgba(255,50,0,0.7)' : 'rgba(200,50,30,0.5)';
      for(let i=0;i<7;i++){
        let a=Math.PI+0.3+i*0.25;
        let len=raging?hr*1.8:hr*1.5;
        c.beginPath();c.moveTo(hx+Math.cos(a)*hr*0.8,hy+Math.sin(a)*hr*0.8);
        c.lineTo(hx+Math.cos(a)*len+rand(-3,3),hy+Math.sin(a)*len);
        c.lineTo(hx+Math.cos(a+0.12)*hr*0.8,hy+Math.sin(a+0.12)*hr*0.8);
        c.closePath();c.fill();
      }
      // 暴怒光环（简化）
      if(raging){
        c.strokeStyle='rgba(255,34,0,0.5)';c.lineWidth=2;
        c.beginPath();c.arc(hx,hy,hr*1.3,0,Math.PI*2);c.stroke();
      }
    },
    bodyExtra: function(c,ox,oy,tw,ny,hy2,sw,sc){
      // Boss手机（更大的3D手机）
      c.fillStyle='#0a0a1e';
      c.beginPath();c.roundRect(sw+sc*0.1,ny+sc*0.1,sc*0.22,sc*0.35,3);c.fill();
      let phoneG=c.createLinearGradient(sw+sc*0.1,ny+sc*0.1,sw+sc*0.32,ny+sc*0.1);
      phoneG.addColorStop(0,'rgba(255,255,255,0.15)');phoneG.addColorStop(1,'rgba(255,255,255,0)');
      c.fillStyle=phoneG;c.beginPath();c.roundRect(sw+sc*0.1,ny+sc*0.1,sc*0.22,sc*0.35,3);c.fill();
      c.fillStyle='rgba(68,136,255,0.9)';
      c.beginPath();c.roundRect(sw+sc*0.13,ny+sc*0.14,sc*0.16,sc*0.25,2);c.fill();
      c.fillStyle='rgba(255,255,255,0.3)';
      c.beginPath();c.moveTo(sw+sc*0.13,ny+sc*0.14);c.lineTo(sw+sc*0.29,ny+sc*0.14);
      c.lineTo(sw+sc*0.13,ny+sc*0.3);c.closePath();c.fill();
      // 肩章（Boss标识）
      c.fillStyle='rgba(255,215,0,0.6)';
      c.beginPath();c.roundRect(-sw-tw*0.1,ny-2,tw*0.2,sc*0.06,2);c.fill();
      c.beginPath();c.roundRect(sw-tw*0.1,ny-2,tw*0.2,sc*0.06,2);c.fill();
    }
  });

  // 护盾特效（简化）
  if(shielded){
    let shieldA=0.4+Math.sin(anim*10)*0.2;
    c.strokeStyle='rgba(68,136,255,'+shieldA+')';c.lineWidth=3;
    c.beginPath();
    for(let i=0;i<6;i++){
      let a=i*Math.PI/3+anim*0.2;
      let r2=size*1.2+10;
      if(i===0)c.moveTo(Math.cos(a)*r2,Math.sin(a)*r2+size*0.1);
      else c.lineTo(Math.cos(a)*r2,Math.sin(a)*r2+size*0.1);
    }
    c.closePath();c.stroke();
  }
  // 名牌（玻璃感）
  c.font='bold 13px Microsoft YaHei,sans-serif';c.textAlign='center';
  let tw2=c.measureText(bossName).width+24;
  let txL=-tw2/2, tyL=-size*1.2-28;
  let tagG=c.createLinearGradient(txL,tyL,txL,tyL+22);
  tagG.addColorStop(0,'rgba(20,0,0,0.9)');tagG.addColorStop(1,'rgba(60,0,0,0.85)');
  c.fillStyle=tagG;c.beginPath();c.roundRect(txL,tyL,tw2,22,5);c.fill();
  c.fillStyle='rgba(255,255,255,0.08)';c.beginPath();c.roundRect(txL,tyL,tw2,10,5);c.fill();
  c.strokeStyle='rgba(255,68,68,0.6)';c.lineWidth=1.2;c.beginPath();c.roundRect(txL,tyL,tw2,22,5);c.stroke();
  c.fillStyle='#ff7777';
  c.fillText(bossName,0,tyL+14);
  // 血条（3D凸起感）
  let bw=size*2.4,bh=8;
  let barY=size*1.2+12;
  c.fillStyle='rgba(0,0,0,0.7)';c.beginPath();c.roundRect(-bw/2,barY,bw,bh,4);c.fill();
  let hpRatio=hp/maxHp;
  let hpFill=bw*hpRatio;
  let hpColor=hpRatio>0.5?'#e74c3c':hpRatio>0.25?'#ff6600':'#ff0000';
  let hpGrad=c.createLinearGradient(-bw/2,barY,-bw/2,barY+bh);
  hpGrad.addColorStop(0,lightenColor(hpColor,40));
  hpGrad.addColorStop(0.4,hpColor);
  hpGrad.addColorStop(1,darkenColor(hpColor,30));
  c.fillStyle=hpGrad;
  c.beginPath();c.roundRect(-bw/2,barY,Math.max(0,hpFill),bh,4);c.fill();
  c.fillStyle='rgba(255,255,255,0.2)';
  c.beginPath();c.roundRect(-bw/2,barY,Math.max(0,hpFill),bh*0.4,4);c.fill();
  c.restore();
}

// ==================== START GAME ====================
function startGame(levelNum){
  let lv=LEVELS[levelNum-1];
  document.getElementById('menu').style.display='none';
  document.getElementById('gameover').style.display='none';
  document.getElementById('levelup').style.display='none';
  G={
    state:'playing',level:levelNum,levelData:lv,
    time:0,maxTime:lv.duration*1000,
    wave:1,waveTimer:0,spawnTimer:0,kills:0,
    screenShake:0,
    mapSize:lv.mapSize,
    player:{
      x:lv.mapSize/2,y:lv.mapSize/2,
      hp:100,maxHp:100,speed:3.5,size:22,
      level:1,xp:0,xpToNext:10,
      weapons:{wave:{lv:1}},weaponTimers:{wave:0},
      passives:{},
      speedMul:1,atkSpdMul:1,damageMul:1,rangeMul:1,magnetMul:1,
      critChance:0,critDamage:2,globalPierce:0,regen:0,
      invincible:0
    },
    camera:{x:0,y:0},
    enemies:[],projectiles:[],xpOrbs:[],
    particles:[],damageTexts:[],lightnings:[],
    orbitals:[],boss:null,
    bossActive:false,bossSpawned:false,bossSkillTimer:0,
    bossSkillIdx:0,bossSkillCooldowns:{}
  };
  if(!G.loopStarted){G.loopStarted=true;let last=performance.now();(function loop(now){
    let dt=Math.min(now-last,50);last=now;
    if(G.state==='playing')update(dt);
    render();
    requestAnimationFrame(loop);
  })(performance.now())}
}

function backToMenu(){
  document.getElementById('gameover').style.display='none';
  document.getElementById('menu').style.display='flex';
}

// ==================== UPDATE ====================
function update(dt){
  let p=G.player,lv=G.levelData;
  // time
  G.time+=dt;
  if(G.time>=G.maxTime){gameOver(true);return}
  // regen
  if(p.regen>0){p.hp=Math.min(p.maxHp,p.hp+p.regen*dt/1000)}
  // invincible
  if(p.invincible>0)p.invincible-=dt;
  // screen shake decay
  G.screenShake*=0.9;if(G.screenShake<0.5)G.screenShake=0;
  // wave
  G.waveTimer+=dt;
  if(G.waveTimer>=20000){G.waveTimer=0;G.wave++;updateHUD()}
  // movement
  let dx=0,dy=0;
  if(keys['w']||keys['arrowup'])dy-=1;
  if(keys['s']||keys['arrowdown'])dy+=1;
  if(keys['a']||keys['arrowleft'])dx-=1;
  if(keys['d']||keys['arrowright'])dx+=1;
  if(touch.active){dx+=touch.dx;dy+=touch.dy}
  let len=Math.hypot(dx,dy);
  if(len>0){
    let spd=p.speed*p.speedMul*(p.invincible>0?0.5:1)*(p.bossSlow&&p.bossSlow>0?0.7:1)*dt/16;
    p.x+=dx/len*spd;p.y+=dy/len*spd;
  }
  p.x=clamp(p.x,p.size,G.mapSize-p.size);
  p.y=clamp(p.y,p.size,G.mapSize-p.size);
  // camera
  G.camera.x=p.x-canvas.width/2;G.camera.y=p.y-canvas.height/2;
  // attack with each weapon
  for(let wid in p.weapons){
    p.weaponTimers[wid]=(p.weaponTimers[wid]||0)+dt;
    let wDef=WEAPONS.find(w=>w.id===wid);
    if(!wDef)continue;
    let wLv=p.weapons[wid].lv-1;
    let rate=wDef.rate[wLv]*p.atkSpdMul;
    if(p.weaponTimers[wid]>=rate){
      if(!wDef.orbital){
        let target=findClosest(p,G.enemies,wDef.range[wLv]*p.rangeMul);
        if(target){
          p.weaponTimers[wid]=0;
          fireWeapon(wid,wDef,wLv,target);
        }
      }else{
        p.weaponTimers[wid]=0;
        updateOrbitals(wid,wDef,wLv);
      }
    }
  }
  // spawn enemies
  G.spawnTimer+=dt;
  let spawnInt=Math.max(150,1000-G.wave*60);
  if(G.spawnTimer>=spawnInt){G.spawnTimer=0;spawnEnemy()}
  // boss spawn (at 60s remaining)
  if(!G.bossSpawned&&G.time>=(G.maxTime-60000)){
    G.bossSpawned=true;G.bossActive=true;spawnBoss();
  }
  // boss skills
  if(G.boss&&G.bossActive){
    G.bossSkillTimer+=dt;
    for(let i=0;i<G.boss.skills.length;i++){
      if(!G.bossSkillCooldowns[i])G.bossSkillCooldowns[i]=0;
      G.bossSkillCooldowns[i]+=dt;
      if(G.bossSkillCooldowns[i]>=G.boss.skills[i].cd){
        G.bossSkillCooldowns[i]=0;
        activateBossSkill(G.boss.skills[i]);
      }
    }
  }
  // update subsystems
  updateProjectiles(dt);
  updateEnemies(dt);
  updateXpOrbs(dt);
  updateOrbitalsPhysics(dt);
  updateParticles(dt);
  updateDamageTexts(dt);
  updateLightnings(dt);
  updateHUD();
}

// ==================== WEAPONS ====================
function findClosest(p,list,range){
  let best=null,bd=range*range;
  for(let e of list){let d=dist(p,e);if(d<bd){bd=d;best=e}}
  return best;
}

function fireWeapon(wid,wDef,wLv,target){
  let p=G.player;
  let dmg=wDef.damage[wLv]*p.damageMul;
  let isCrit=Math.random()<p.critChance;
  if(isCrit)dmg*=p.critDamage;
  let pierce=wDef.pierce[wLv]+(p.globalPierce||0);
  let a=angle(p,target);
  let count=wDef.projCount[wLv];
  let spread=0.3;
  for(let i=0;i<count;i++){
    let sa=count===1?a:a-spread/2+spread*i/(count-1);
    let proj={
      x:p.x,y:p.y,
      vx:Math.cos(sa)*6,vy:Math.sin(sa)*6,
      damage:dmg,crit:isCrit,
      size:wDef.aoe?wDef.aoeSize[wLv]*0.3:6,
      pierce:pierce,hitList:[],
      color:wDef.projColor,weaponId:wid,
      dot:wDef.dot?{damage:wDef.dot.damage*(1+wLv*0.5),duration:wDef.dot.duration,applied:{}}:null,
      slow:wDef.slow?{...wDef.slow,duration:wDef.slow.duration[wLv],applied:{}}:null,
      aoe:wDef.aoe||false,aoeSize:wDef.aoe?wDef.aoeSize[wLv]:0,
      life:1500
    };
    G.projectiles.push(proj);
  }
}

function updateOrbitals(wid,wDef,wLv){
  G.orbitals=[];
  for(let i=0;i<wDef.projCount[wLv];i++){
    G.orbitals.push({angle:Math.PI*2*i/wDef.projCount[wLv],dist:wDef.range[wLv],
      damage:wDef.damage[wLv]*G.player.damageMul,size:8,color:wDef.projColor,cooldown:0});
  }
}

function updateOrbitalsPhysics(dt){
  let p=G.player;
  for(let o of G.orbitals){
    o.angle+=0.003*dt;
    o.cooldown=Math.max(0,o.cooldown-dt);
    let ox=p.x+Math.cos(o.angle)*o.dist;
    let oy=p.y+Math.sin(o.angle)*o.dist;
    for(let e of G.enemies){
      if(dist({x:ox,y:oy},e)<o.size+e.size&&o.cooldown<=0){
        damageEnemy(e,o.damage,false);
        o.cooldown=500;
        spawnParticles(ox,oy,3,'#7f8c8d');
      }
    }
  }
}

// ==================== PROJECTILES ====================
function updateProjectiles(dt){
  for(let i=G.projectiles.length-1;i>=0;i--){
    let pr=G.projectiles[i];
    pr.x+=pr.vx*dt/16;pr.y+=pr.vy*dt/16;
    pr.life-=dt;
    if(pr.life<=0||pr.pierce<=0){G.projectiles.splice(i,1);continue}
    // check hits
    if(pr.aoe){
      // AOE: damage all in range
      for(let e of G.enemies){
        if(pr.hitList.includes(e))continue;
        if(dist(pr,e)<pr.aoeSize/2+e.size){
          damageEnemy(e,pr.damage,pr.crit,pr.dot,pr.slow);
          pr.hitList.push(e);
        }
      }
    }else{
      for(let e of G.enemies){
        if(pr.hitList.includes(e))continue;
        if(dist(pr,e)<pr.size+e.size){
          damageEnemy(e,pr.damage,pr.crit,pr.dot,pr.slow);
          pr.hitList.push(e);pr.pierce--;
          spawnParticles(pr.x,pr.y,2,pr.color);
          if(pr.pierce<=0){G.projectiles.splice(i,1);break}
        }
      }
    }
  }
}

// ==================== ENEMIES ====================
function spawnEnemy(){
  let types=G.levelData.enemies;
  let waveScale=1+(G.wave-1)*0.15;
  // type selection based on wave
  let pool=['patient'];
  if(G.wave>=2)pool.push('fast_patient','family');
  if(G.wave>=3)pool.push('admin','angry_patient');
  if(G.wave>=5)pool.push('angry_patient');
  let typeId=pick(pool);
  let et=ENEMY_TYPES[typeId];
  // spawn position outside screen
  let p=G.player,side=randInt(0,3),x,y,m=60;
  let margin=300;
  switch(side){
    case 0:x=rand(0,G.mapSize);y=p.y-canvas.height/2-margin;break;
    case 1:x=rand(0,G.mapSize);y=p.y+canvas.height/2+margin;break;
    case 2:x=p.x-canvas.width/2-margin;y=rand(0,G.mapSize);break;
    case 3:x=p.x+canvas.width/2+margin;y=rand(0,G.mapSize);break;
  }
  x=clamp(x,m,G.mapSize-m);y=clamp(y,m,G.mapSize-m);
  let isElite=typeId==='angry_patient'||typeId==='admin';
  G.enemies.push({
    x,y,type:typeId,
    hp:et.hp*waveScale,maxHp:et.hp*waveScale,
    speed:et.speed,damage:et.damage*(isElite?1.5:1),
    xp:et.xp*(isElite?2:1),size:et.size*waveScale,
    color:et.color,draw:et.draw,
    hitFlash:0,freezeTimer:0,slowMul:1,
    elite:isElite,
    // elite: intermittent dash
    dashTimer:isElite?rand(3000,6000):999999,dashing:false,dashDuration:0,
    isBoss:false
  });
}

function spawnBoss(){
  let lv=G.levelData;
  let waveScale=1+(G.wave-1)*0.15;
  let bossHp=800*waveScale*(lv.mapSize/3000);
  G.boss={
    x:lv.mapSize/2,y:lv.mapSize/2-200,
    hp:bossHp,maxHp:bossHp,
    speed:1.0,damage:20*waveScale,
    size:40,xp:100,color:'#c0392b',
    name:lv.bossName,skills:lv.bossSkills,
    shielded:false,shieldTimer:0,rageTimer:0,raging:false,
    hitFlash:0,freezeTimer:0,slowMul:1,
    isBoss:true,elite:false,
    type:'boss',draw:'boss'
  };
  G.enemies.push(G.boss);
  showBossSpeech('⚠️ '+lv.bossName+' 出现了！');
}

function updateEnemies(dt){
  let p=G.player;
  for(let i=G.enemies.length-1;i>=0;i--){
    let e=G.enemies[i];
    if(e.hitFlash>0)e.hitFlash-=dt;
    if(e.freezeTimer>0){e.freezeTimer-=dt;continue}
    // slow
    let slowTarget=e.isBoss?0.85:e.elite?0.7:0;
    if(e.slowMul<1){e.slowMul=Math.min(1,e.slowMul+dt/1000*0.5)}
    // move toward player
    let spd=e.speed*e.slowMul*(e.freezeTimer>0?0:1)*dt/16;
    if(e.dashing){
      spd*=2.5;e.dashDuration-=dt;
      if(e.dashDuration<=0){e.dashing=false;e.dashTimer=rand(3000,6000)}
    }else if(e.elite){
      e.dashTimer-=dt;
      if(e.dashTimer<=0){e.dashing=true;e.dashDuration=600}
    }
    // boss specific
    if(e.isBoss){
      spd*=e.slowMul;
      if(e.shieldTimer>0){e.shieldTimer-=dt;if(e.shieldTimer<=0)e.shielded=false}
      if(e.rageTimer>0){e.rageTimer-=dt;if(e.rageTimer<=0)e.raging=false}
    }
    let a=angle(e,p);
    e.x+=Math.cos(a)*spd;e.y+=Math.sin(a)*spd;
    e.x=clamp(e.x,e.size,G.mapSize-e.size);
    e.y=clamp(e.y,e.size,G.mapSize-e.size);
    // damage player
    if(p.invincible<=0&&dist(e,p)<e.size+p.size){
      p.hp-=e.damage;
      p.invincible=500;
      G.screenShake=8;
      spawnParticles(p.x,p.y,5,'#e74c3c');
      addDmgText(p.x,p.y-20,'-'+e.damage,'#ff4444');
      if(p.hp<=0){gameOver(false);return}
    }
  }
}

// ==================== DAMAGE ====================
function damageEnemy(e,dmg,crit,dot,slow){
  // shield check
  if(e.isBoss&&e.shielded)return;
  e.hp-=dmg;e.hitFlash=100;
  G.screenShake=Math.max(G.screenShake,crit?5:2);
  addDmgText(e.x,e.y-e.size,Math.floor(dmg)+(crit?'!':''),crit?'#ff0':'#fff');
  spawnParticles(e.x,e.y,crit?6:2,crit?'#ff0':'#fff');
  // dot
  if(dot&&!dot.applied[e.x+'_'+e.y]){
    dot.applied[e.x+'_'+e.y]=true;
    let dotId=setInterval(()=>{
      if(e.hp<=0){clearInterval(dotId);return}
      e.hp-=dot.damage;addDmgText(e.x+rand(-10,10),e.y-e.size,Math.floor(dot.damage),'#9b59b6');
      if(e.hp<=0)killEnemy(e);
    },500);
    setTimeout(()=>clearInterval(dotId),dot.duration);
  }
  // slow
  if(slow&&!slow.applied[e.x+'_'+e.y]){
    slow.applied[e.x+'_'+e.y]=true;
    let mult=1;
    if(e.isBoss)mult=slow.boss;
    else if(e.elite)mult=slow.elite;
    else if(e.draw==='fast')mult=slow.speed;
    else mult=slow.basic;
    e.slowMul=mult;
    setTimeout(()=>{e.slowMul=1},slow.duration);
    if(mult===0)addDmgText(e.x,e.y-e.size-15,'定身!','#2ecc71');
  }
  if(e.hp<=0)killEnemy(e);
}

function killEnemy(e){
  G.kills++;
  spawnParticles(e.x,e.y,12,e.color);
  // drop xp
  let count=e.isBoss?10:e.elite?3:1;
  for(let i=0;i<count;i++){
    G.xpOrbs.push({x:e.x+rand(-15,15),y:e.y+rand(-15,15),value:e.isBoss?10:e.xp,size:e.isBoss?8:5});
  }
  // chain lightning from boss kill
  if(e.isBoss){
    for(let i=0;i<5;i++){
      let t=findClosest(e,G.enemies,400);
      if(t){addLightning(e.x,e.y,t.x,t.y);damageEnemy(t,G.player.damage*G.player.damageMul*0.5,false)}
    }
  }
  let idx=G.enemies.indexOf(e);
  if(idx>=0)G.enemies.splice(idx,1);
  if(e===G.boss){G.bossActive=false;showBossSpeech('🎉 Boss 被击败！')}
}

// ==================== BOSS SKILLS ====================
function activateBossSkill(skill){
  let b=G.boss;if(!b||b.hp<=0)return;
  showBossSpeech(skill.quote);
  switch(skill.effect){
    case 'slow':
      // slow player
      G.player.bossSlow=skill.duration;
      setTimeout(()=>{G.player.bossSlow=0},skill.duration);
      break;
    case 'shield':
      b.shielded=true;b.shieldTimer=skill.duration;
      break;
    case 'bullets':
      // fire bullets toward player
      for(let i=0;i<skill.val;i++){
        setTimeout(()=>{
          if(!G.boss||G.boss.hp<=0)return;
          let a=angle(G.boss,G.player);
          G.projectiles.push({
            x:G.boss.x,y:G.boss.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4,
            damage:skill.val*5,size:8,pierce:1,hitList:[],
            color:skill.color,weaponId:'boss',dot:null,slow:null,aoe:false,aoeSize:0,life:2000,
            isEnemy:true
          });
        },i*200);
      }
      break;
    case 'summon':
      for(let i=0;i<skill.val;i++){
        setTimeout(()=>{
          let et=ENEMY_TYPES.angry_patient;
          let a=rand(0,Math.PI*2),d=80;
          G.enemies.push({
            x:G.boss.x+Math.cos(a)*d,y:G.boss.y+Math.sin(a)*d,
            type:'angry_patient',hp:et.hp,maxHp:et.hp,speed:et.speed,
            damage:et.damage,xp:et.xp,size:et.size,color:et.color,
            draw:et.draw,hitFlash:0,freezeTimer:0,slowMul:1,
            elite:true,dashTimer:4000,dashing:false,dashDuration:0,isBoss:false
          });
        },i*500);
      }
      break;
    case 'rage':
      b.raging=true;b.rageTimer=skill.duration;
      // temporarily increase boss damage
      let origDmg=b.damage;
      b.damage*=skill.val;
      setTimeout(()=>{if(b)b.damage=origDmg},skill.duration);
      break;
  }
}

// ==================== XP & LEVEL ====================
function updateXpOrbs(dt){
  let p=G.player;
  for(let i=G.xpOrbs.length-1;i>=0;i--){
    let o=G.xpOrbs[i];
    let d=dist(p,o);
    let magnetR=80*p.magnetMul;
    if(d<magnetR){
      let a=angle(o,p);
      let spd=Math.max(3,12-d*0.1)*dt/16;
      o.x+=Math.cos(a)*spd;o.y+=Math.sin(a)*spd;
    }
    if(d<p.size+o.size){
      p.xp+=o.value;G.xpOrbs.splice(i,1);
      if(p.xp>=p.xpToNext){p.xp-=p.xpToNext;p.level++;p.xpToNext=Math.floor(10+p.level*5+p.level*p.level*0.5);showLevelUp()}
    }
  }
}

function showLevelUp(){
  G.state='levelup';
  let p=G.player;
  // build available options
  let options=[];
  // weapons not yet owned
  for(let w of WEAPONS){
    if(!p.weapons[w.id])options.push({type:'weapon',weapon:w,lv:1});
    else if(p.weapons[w.id].lv<w.maxLv)options.push({type:'weapon',weapon:w,lv:p.weapons[w.id].lv+1});
  }
  // passives
  for(let ps of PASSIVES){
    let curLv=p.passives[ps.id]||0;
    if(curLv<ps.maxLv)options.push({type:'passive',passive:ps,lv:curLv+1});
  }
  // pick 3 random
  let picked=[];
  let pool=[...options];
  for(let i=0;i<3&&pool.length>0;i++){
    let idx=randInt(0,pool.length-1);
    picked.push(pool.splice(idx,1)[0]);
  }
  // render cards
  let container=document.getElementById('levelup-cards');
  container.innerHTML='';
  for(let opt of picked){
    let card=document.createElement('div');card.className='card';
    if(opt.type==='weapon'){
      let w=opt.weapon;
      card.innerHTML=`<div class="icon">${w.icon}</div><div class="name">${w.name} Lv.${opt.lv}</div><div class="desc">${w.desc}</div><div class="lv">${opt.lv===1?'新获得！':'升级 → Lv.'+opt.lv}</div>`;
      card.onclick=()=>{p.weapons[w.id]={lv:opt.lv};p.weaponTimers[w.id]=0;w.apply&&w.apply(p,opt.lv);closeLevelUp()};
    }else{
      let ps=opt.passive;
      card.innerHTML=`<div class="icon">${ps.icon}</div><div class="name">${ps.name} Lv.${opt.lv}</div><div class="desc">${ps.desc}</div><div class="lv">${opt.lv===1?'新获得！':'Lv.'+(opt.lv-1)+' → Lv.'+opt.lv}</div>`;
      card.onclick=()=>{p.passives[ps.id]=opt.lv;ps.apply(p,opt.lv);closeLevelUp()};
    }
    container.appendChild(card);
  }
  document.getElementById('levelup').style.display='flex';
}

function closeLevelUp(){
  document.getElementById('levelup').style.display='none';
  G.state='playing';
}

// ==================== PARTICLES ====================
function spawnParticles(x,y,count,color){

    G.particles.push({x,y,vx:rand(-3,3),vy:rand(-3,3),life:rand(300,600),maxLife:600,size:rand(2,6),color});
  }
}
function updateParticles(dt){
  for(let i=G.particles.length-1;i>=0;i--){
    let p=G.particles[i];
    p.x+=p.vx*dt/16;p.y+=p.vy*dt/16;p.life-=dt;
    if(p.life<=0)G.particles.splice(i,1);
  }
}

function addDmgText(x,y,text,color){
  G.damageTexts.push({x,y,text,color,life:800,maxLife:800,vy:-1.5});
}
function updateDamageTexts(dt){
  for(let i=G.damageTexts.length-1;i>=0;i--){
    let t=G.damageTexts[i];t.y+=t.vy*dt/16;t.life-=dt;
    if(t.life<=0)G.damageTexts.splice(i,1);
  }
}

function addLightning(x1,y1,x2,y2){
  G.lightnings.push({x1,y1,x2,y2,life:300});
}
function updateLightnings(dt){
  for(let i=G.lightnings.length-1;i>=0;i--){
    G.lightnings[i].life-=dt;
    if(G.lightnings[i].life<=0)G.lightnings.splice(i,1);
  }
}

function showBossSpeech(text){
  let el=document.getElementById('boss-speech');
  el.textContent=text;el.style.opacity='1';el.style.transform='translate(-50%,-50%) scale(1.2)';
  setTimeout(()=>{el.style.transform='translate(-50%,-50%) scale(1)'},100);

}

// ==================== GAME OVER ====================
function gameOver(victory){
  G.state=victory?'victory':'gameover';
  let go=document.getElementById('gameover');
  go.className='overlay'+(victory?' victory':'');
  go.style.display='flex';
  document.getElementById('go-title').textContent=victory?'🎉 关卡通过！':'💀 游戏结束';

  let wNames=Object.keys(G.player.weapons).map(id=>{let w=WEAPONS.find(x=>x.id===id);return w?w.icon+w.name:''}).join(', ');
  document.getElementById('go-weapons').textContent=wNames||'无';
}

// ==================== HUD ====================
function updateHUD(){
  let p=G.player;
  document.getElementById('hp-text').textContent=Math.max(0,Math.ceil(p.hp))+'/'+p.maxHp;

  for(let pid in p.passives){let ps=PASSIVES.find(x=>x.id===pid);if(ps)whtml+=`<div style="color:#27ae60">${ps.icon} ${ps.name} Lv.${p.passives[pid]}</div>`}

    document.getElementById('boss-hp-bar').style.display='none';
  }
}

// ==================== RENDER ====================
function render(){
  if(!G.player)return;
  let p=G.player,cx=G.camera.x,cy=G.camera.y;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // screen shake
  ctx.save();
  if(G.screenShake>0){ctx.translate(rand(-G.screenShake,G.screenShake),rand(-G.screenShake,G.screenShake))}
  // background - 3D地板效果
  let lv=G.levelData;
  // 深色渐变背景
  let bgGrad=ctx.createRadialGradient(canvas.width/2,canvas.height/2,0,canvas.width/2,canvas.height/2,Math.max(canvas.width,canvas.height)*0.8);
  let bgC1=lv.bgColor,bgC2=darkenColor(lv.bgColor.length===7?lv.bgColor:'#f0f0e8',25)||'#c8c8b8';
  bgGrad.addColorStop(0,bgC1);
  bgGrad.addColorStop(0.6,bgC2||bgC1);
  bgGrad.addColorStop(1,darkenColor(bgC2||bgC1,20)||bgC1);
  ctx.fillStyle=bgGrad;ctx.fillRect(0,0,canvas.width,canvas.height);
  // 主网格（瓷砖感）
  let gs=80,sx=-(cx%gs),sy=-(cy%gs);
  ctx.strokeStyle=lv.gridColor;ctx.lineWidth=0.7;
  for(let x=sx;x<canvas.width;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke()}
  for(let y=sy;y<canvas.height;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke()}
  // 瓷砖高光（每隔一块绘制高光角）
  let gs2=gs*2,sx2=-(cx%gs2),sy2=-(cy%gs2);
  ctx.fillStyle='rgba(255,255,255,0.04)';
  for(let tx=sx2;tx<canvas.width;tx+=gs2){
    for(let ty=sy2;ty<canvas.height;ty+=gs2){
      ctx.fillRect(tx,ty,gs,gs);
    }
  }
  // 大格子（区域感）
  let gs3=gs*5,sx3=-(cx%gs3),sy3=-(cy%gs3);
  ctx.strokeStyle='rgba(0,0,0,0.06)';ctx.lineWidth=1.5;
  for(let x=sx3;x<canvas.width;x+=gs3){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke()}
  for(let y=sy3;y<canvas.height;y+=gs3){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke()}
  // map border - 3D厚壁
  // 外墙厚度阴影
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.fillRect(-cx-8,-cy-8,G.mapSize+16,8); // 上
  ctx.fillRect(-cx-8,-cy-8,8,G.mapSize+16); // 左
  ctx.fillRect(-cx,-cy+G.mapSize,G.mapSize+8,8); // 下
  ctx.fillRect(-cx+G.mapSize,-cy,8,G.mapSize+8); // 右
  // 主墙壁
  ctx.strokeStyle=lv.wallColor;ctx.lineWidth=6;
  ctx.strokeRect(-cx,-cy,G.mapSize,G.mapSize);
  // 内侧高光
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=2;
  ctx.strokeRect(-cx+3,-cy+3,G.mapSize-6,G.mapSize-6);
  // hospital decorations (simple)
  drawDecorations(cx,cy,lv);
  // XP orbs - 3D发光宝石
  for(let o of G.xpOrbs){
    let ox=o.x-cx,oy=o.y-cy;
    if(ox<-20||ox>canvas.width+20||oy<-20||oy>canvas.height+20)continue;
    let pulse=0.65+Math.sin(Date.now()/220+o.x*0.09)*0.32;
    let r=o.size;
    // 外层大光晕（简化）
    ctx.globalAlpha=0.15*pulse;
    ctx.fillStyle='#2ecc71';
    ctx.beginPath();ctx.arc(ox,oy,r*2,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // 3D 宝石主体
    draw3DSphere(ctx, ox, oy, r, '#2ecc71', {
      gradStops:[
        [0,'#88ffcc'],[0.3,'#2ecc71'],[0.65,'#1a8f50'],[1,'#0a3020']
      ],
      noShadow:true
    });
    // 宝石切面反光（简化）
    ctx.globalAlpha=0.4*pulse;
    ctx.fillStyle='rgba(200,255,230,0.6)';
    ctx.beginPath();
    ctx.moveTo(ox,oy-r*0.8);
    ctx.lineTo(ox+r*0.6,oy);
    ctx.lineTo(ox,oy+r*0.2);
    ctx.lineTo(ox-r*0.6,oy);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha=1;
  }
  // enemies
  for(let e of G.enemies){
    let ex=e.x-cx,ey=e.y-cy;
    if(ex<-60||ex>canvas.width+60||ey<-60||ey>canvas.height+60)continue;
    // shadow
    ctx.fillStyle='rgba(0,0,0,0.15)';ctx.beginPath();ctx.ellipse(ex,ey+e.size*0.7,e.size*0.8,e.size*0.3,0,0,Math.PI*2);ctx.fill();
    if(e.isBoss){
      drawBoss(ctx,ex,ey,e.size,e.name,e.hp,e.maxHp,e.color,e.shielded,e.raging);
    }else{
      if(e.hitFlash>0){ctx.globalAlpha=0.6;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex,ey,e.size+3,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
      drawPatient(ctx,ex,ey,e.size,e.color,e.draw,e.elite);
      // elite indicator
      if(e.elite){ctx.strokeStyle='#f39c12';ctx.lineWidth=2;ctx.beginPath();ctx.arc(ex,ey,e.size+4,0,Math.PI*2);ctx.stroke()}
      // hp bar for elite
      if(e.elite&&e.hp<e.maxHp){
        let bw=e.size*2;
        ctx.fillStyle='#333';ctx.fillRect(ex-bw/2,ey-e.size-10,bw,4);
        ctx.fillStyle='#e74c3c';ctx.fillRect(ex-bw/2,ey-e.size-10,bw*(e.hp/e.maxHp),4);
      }
      // slow indicator
      if(e.slowMul<1){ctx.strokeStyle='rgba(46,204,113,0.5)';ctx.lineWidth=2;ctx.setLineDash([3,3]);ctx.beginPath();ctx.arc(ex,ey,e.size+6,0,Math.PI*2);ctx.stroke();ctx.setLineDash([])}
      if(e.freezeTimer>0){ctx.fillStyle='rgba(52,152,219,0.3)';ctx.beginPath();ctx.arc(ex,ey,e.size+4,0,Math.PI*2);ctx.fill()}
    }
  }
  // projectiles - 3D金属球体
  for(let pr of G.projectiles){
    let px=pr.x-cx,py=pr.y-cy;
    if(px<-20||px>canvas.width+20||py<-20||py>canvas.height+20)continue;
    if(pr.aoe){
      // AOE脉冲环（简化）
      ctx.globalAlpha=0.2;
      ctx.fillStyle=pr.color;
      ctx.beginPath();ctx.arc(px,py,pr.aoeSize/2,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
      draw3DSphere(ctx,px,py,pr.size,pr.color,{noShadow:true});
    }else if(pr.isEnemy){
      draw3DSphere(ctx,px,py,pr.size,pr.color||'#ff4444',{
        gradStops:[[0,'#ff9999'],[0.4,pr.color||'#ff4444'],[1,'#440000']],
        noShadow:true
      });
    }else{
      // 玩家子弹
      let trailAlpha=0.25;
      // 尾迹（简化渐隐）
      for(let t=1;t<=3;t++){
        ctx.globalAlpha=trailAlpha*(1-t*0.28);
        ctx.fillStyle=pr.color;
        ctx.beginPath();ctx.arc(px-pr.vx*t*1.2,py-pr.vy*t*1.2,pr.size*(1-t*0.22),0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;
      draw3DSphere(ctx,px,py,pr.size,pr.color,{noShadow:true});
    }
  }
  // orbitals - 3D护盾球
  for(let o of G.orbitals){
    let ox=p.x+Math.cos(o.angle)*o.dist-cx;
    let oy=p.y+Math.sin(o.angle)*o.dist-cy;
    // 轨道连线
    ctx.strokeStyle='rgba(127,140,141,0.2)';ctx.lineWidth=1;ctx.setLineDash([3,5]);
    ctx.beginPath();ctx.moveTo(p.x-cx,p.y-cy);ctx.lineTo(ox,oy);ctx.stroke();
    ctx.setLineDash([]);
    draw3DSphere(ctx,ox,oy,o.size,'#7f8c8d',{
      gradStops:[[0,'#bdc3c7'],[0.35,'#95a5a6'],[0.7,'#5d6d7e'],[1,'#1c2833']],
      glowColor:o.color,glowBlur:8,noShadow:true
    });
  }
  // player
  let ppx=p.x-cx,ppy=p.y-cy;
  drawPlayer(ctx,ppx,ppy,p.size,p.hp,p.maxHp,p.invincible>0);
  // particles - 3D深度感粒子
  for(let pt of G.particles){
    let ptx=pt.x-cx,pty=pt.y-cy;
    let a=pt.life/pt.maxLife;
    let r=pt.size*a;
    if(r<0.3)continue;
    ctx.globalAlpha=a;
    // 大粒子用3D球，小的用菱形
    if(pt.size>4){
      draw3DSphere(ctx,ptx,pty,r,pt.color,{noShadow:true});
    }else{
      // 菱形粒子（快速绘制）
      ctx.fillStyle=pt.color;
      ctx.beginPath();
      ctx.moveTo(ptx,pty-r);ctx.lineTo(ptx+r*0.7,pty);
      ctx.lineTo(ptx,pty+r);ctx.lineTo(ptx-r*0.7,pty);
      ctx.closePath();ctx.fill();
      // 高光
      ctx.fillStyle='rgba(255,255,255,'+(0.3*a)+')';
      ctx.beginPath();ctx.arc(ptx-r*0.2,pty-r*0.3,r*0.25,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.globalAlpha=1;
  // damage texts
  for(let t of G.damageTexts){
    let tx=t.x-cx,ty=t.y-cy;
    ctx.globalAlpha=t.life/t.maxLife;ctx.fillStyle=t.color;
    ctx.font='bold '+(t.text.includes('!')?'18':'14')+'px sans-serif';ctx.textAlign='center';
    ctx.fillText(t.text,tx,ty);
  }
  ctx.globalAlpha=1;
  // lightnings（简化，去掉shadowBlur）
  for(let l of G.lightnings){
    let la=l.life/300;
    let mx=(l.x1+l.x2)/2+rand(-20,20),my=(l.y1+l.y2)/2+rand(-20,20);
    // 外层
    ctx.globalAlpha=la*0.3;ctx.strokeStyle='rgba(100,180,255,0.6)';ctx.lineWidth=8;
    ctx.beginPath();ctx.moveTo(l.x1-cx,l.y1-cy);ctx.lineTo(mx-cx,my-cy);ctx.lineTo(l.x2-cx,l.y2-cy);ctx.stroke();
    // 中层
    ctx.globalAlpha=la*0.7;ctx.strokeStyle='rgba(150,220,255,0.8)';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(l.x1-cx,l.y1-cy);ctx.lineTo(mx-cx,my-cy);ctx.lineTo(l.x2-cx,l.y2-cy);ctx.stroke();
    // 内层白芯
    ctx.globalAlpha=la;ctx.strokeStyle='#ffffff';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(l.x1-cx,l.y1-cy);ctx.lineTo(mx-cx,my-cy);ctx.lineTo(l.x2-cx,l.y2-cy);ctx.stroke();
  }
  ctx.globalAlpha=1;
  // boss slow indicator on player
  if(p.bossSlow&&p.bossSlow>0){
    ctx.strokeStyle='rgba(255,68,68,0.5)';ctx.lineWidth=2;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.arc(ppx,ppy,p.size+8,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
  }
  // joystick - 3D质感
  if(touch.active){
    // 底座
    let jbG=ctx.createRadialGradient(touch.sx,touch.sy,0,touch.sx,touch.sy,50);
    jbG.addColorStop(0,'rgba(255,255,255,0.12)');jbG.addColorStop(1,'rgba(255,255,255,0.02)');
    ctx.fillStyle=jbG;ctx.beginPath();ctx.arc(touch.sx,touch.sy,50,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(touch.sx,touch.sy,50,0,Math.PI*2);ctx.stroke();
    // 圆心十字
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(touch.sx-20,touch.sy);ctx.lineTo(touch.sx+20,touch.sy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(touch.sx,touch.sy-20);ctx.lineTo(touch.sx,touch.sy+20);ctx.stroke();
    // 3D摇杆球
    let jx=touch.sx+touch.dx*50, jy=touch.sy+touch.dy*50;
    draw3DSphere(ctx,jx,jy,22,'#3498db',{
      gradStops:[[0,'#74b9ff'],[0.4,'#3498db'],[0.8,'#1a5276'],[1,'#0a2030']],
      glowColor:'rgba(52,152,219,0.5)',glowBlur:8,noShadow:true
    });
  }
  ctx.restore();
  // minimap
  drawMinimap();
}

function drawDecorations(cx,cy,lv){
  ctx.save();
  // Hospital signs along walls
  ctx.font='bold 13px Microsoft YaHei,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  let signs=['放射科','CT室','MRI室','超声科','挂号处','药房','检验科','急诊','门诊','住院部'];
  for(let i=0;i<10;i++){
    let sx=i*320+160-cx,sy=30-cy;
    if(sx>-50&&sx<canvas.width+50&&sy>-50&&sy<canvas.height+50){
      ctx.fillStyle='rgba(255,255,255,0.9)';
      ctx.strokeStyle=lv.accent+'88';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.roundRect(sx-38,sy-13,76,26,5);ctx.fill();ctx.stroke();
      ctx.fillStyle=lv.accent;ctx.fillText(signs[i],sx,sy+1);
    }
  }
  // Bottom wall signs
  for(let i=0;i<10;i++){
    let sx=i*320+160-cx,sy=lv.mapSize-30-cy;
    if(sx>-50&&sx<canvas.width+50&&sy>-50&&sy<canvas.height+50){
      ctx.fillStyle='rgba(255,255,255,0.9)';
      ctx.strokeStyle=lv.accent+'88';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.roundRect(sx-38,sy-13,76,26,5);ctx.fill();ctx.stroke();
      ctx.fillStyle=lv.accent;ctx.fillText(signs[i],sx,sy+1);
    }
  }
  // Left wall signs
  let vsigns=['ICU','NICU','B超室','VIP','抢救室'];
  for(let i=0;i<vsigns.length;i++){
    let sx=30-cx,sy=i*400+200-cy;
    if(sx>-50&&sx<canvas.width+50&&sy>-50&&sy<canvas.height+50){
      ctx.fillStyle='rgba(255,255,255,0.9)';
      ctx.strokeStyle=lv.accent+'88';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.roundRect(sx-24,sy-14,48,28,4);ctx.fill();ctx.stroke();
      ctx.fillStyle=lv.accent;ctx.fillText(vsigns[i],sx,sy+1);
    }
  }
  // Floor objects (deterministic, 大步长减少调用)
  for(let x=100;x<G.mapSize;x+=500){
    for(let y=100;y<G.mapSize;y+=500){
      let dx=x-cx,dy=y-cy;
      if(dx<-40||dx>canvas.width+40||dy<-40||dy>canvas.height+40)continue;
      let seed=Math.abs(Math.sin(x*0.0031)*99999+Math.cos(y*0.0031)*99999)%5;
      ctx.globalAlpha=0.4;
      drawFloorObj(dx,dy,seed);
      ctx.globalAlpha=1;
    }
  }
  ctx.restore();
}

function drawFloorObj(x,y,seed){
  ctx.strokeStyle='rgba(0,0,0,0.12)';ctx.fillStyle='rgba(0,0,0,0.08)';ctx.lineWidth=1.5;
  if(seed<1){
    ctx.fillRect(x-8,y-5,16,4);ctx.strokeRect(x-8,y-5,16,4);
    ctx.fillRect(x-8,y,3,9);ctx.fillRect(x+5,y,3,9);ctx.fillRect(x-8,y+9,16,2);
  }else if(seed<2){
    ctx.fillRect(x-14,y-7,28,14);ctx.strokeRect(x-14,y-7,28,14);
    ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(x-13,y-6,26,4);
  }else if(seed<3){
    ctx.strokeStyle='#888';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(x,y-18);ctx.lineTo(x,y+6);ctx.stroke();
    ctx.fillStyle='#4488ff';ctx.fillRect(x-4,y-22,8,6);
  }else if(seed<4){
    ctx.fillStyle='#666';
    ctx.beginPath();ctx.moveTo(x-5,y+6);ctx.lineTo(x-4,y-5);ctx.lineTo(x+4,y-5);ctx.lineTo(x+5,y+6);ctx.closePath();ctx.fill();
  }else{
    ctx.strokeStyle='rgba(0,0,0,0.05)';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(x,y-5);ctx.lineTo(x,y+5);ctx.moveTo(x-5,y);ctx.lineTo(x+5,y);ctx.stroke();
  }
}

function drawMinimap(){
  let ms=120,mScale=ms/G.mapSize;
  // 3D玻璃背景
  let mmBG=mmCtx.createRadialGradient(ms/2,ms/2,0,ms/2,ms/2,ms*0.8);
  mmBG.addColorStop(0,'rgba(10,10,30,0.85)');
  mmBG.addColorStop(1,'rgba(0,0,5,0.92)');
  mmCtx.fillStyle=mmBG;mmCtx.fillRect(0,0,ms,ms);
  // 网格
  mmCtx.strokeStyle='rgba(255,255,255,0.04)';mmCtx.lineWidth=0.5;
  for(let i=10;i<ms;i+=10){
    mmCtx.beginPath();mmCtx.moveTo(i,0);mmCtx.lineTo(i,ms);mmCtx.stroke();
    mmCtx.beginPath();mmCtx.moveTo(0,i);mmCtx.lineTo(ms,i);mmCtx.stroke();
  }
  // enemies（简化）
  for(let e of G.enemies){
    let ex=e.x*mScale, ey=e.y*mScale;
    if(e.isBoss){
      mmCtx.fillStyle='#ff2200';
      mmCtx.beginPath();mmCtx.arc(ex,ey,4.5,0,Math.PI*2);mmCtx.fill();
      mmCtx.fillStyle='#ff8866';
      mmCtx.beginPath();mmCtx.arc(ex-1,ey-1,2,0,Math.PI*2);mmCtx.fill();
    }else{
      let ec=e.elite?'#ff8800':'#ff5555';
      mmCtx.fillStyle=ec;
      let s=e.elite?3:2;
      mmCtx.beginPath();mmCtx.arc(ex,ey,s,0,Math.PI*2);mmCtx.fill();
    }
  }
  // xp orbs
  mmCtx.fillStyle='rgba(46,204,113,0.7)';
  for(let o of G.xpOrbs){mmCtx.fillRect(o.x*mScale,o.y*mScale,1.5,1.5)}
  // 玩家
  let pPulse=0.7+Math.sin(Date.now()/300)*0.3;
  let px=G.player.x*mScale, py=G.player.y*mScale;
  mmCtx.fillStyle='rgba(255,220,50,0.2)';mmCtx.beginPath();mmCtx.arc(px,py,6,0,Math.PI*2);mmCtx.fill();
  mmCtx.fillStyle='#ffdd44';
  mmCtx.beginPath();mmCtx.arc(px,py,3.5,0,Math.PI*2);mmCtx.fill();
  mmCtx.fillStyle='rgba(255,255,200,0.8)';
  mmCtx.beginPath();mmCtx.arc(px-1,py-1,1.2,0,Math.PI*2);mmCtx.fill();
  // 视口
  mmCtx.strokeStyle='rgba(255,255,255,'+(pPulse*0.4)+')';mmCtx.lineWidth=1;
  mmCtx.setLineDash([3,3]);
  mmCtx.strokeRect(G.camera.x*mScale,G.camera.y*mScale,canvas.width*mScale,canvas.height*mScale);
  mmCtx.setLineDash([]);
  // 外边框（3D斜切感）
  let mmEdge=mmCtx.createLinearGradient(0,0,ms,ms);
  mmEdge.addColorStop(0,'rgba(255,255,255,0.3)');
  mmEdge.addColorStop(0.5,'rgba(255,255,255,0.1)');
  mmEdge.addColorStop(1,'rgba(255,255,255,0.05)');
  mmCtx.strokeStyle=mmEdge;mmCtx.lineWidth=2;mmCtx.strokeRect(0,0,ms,ms);
}
